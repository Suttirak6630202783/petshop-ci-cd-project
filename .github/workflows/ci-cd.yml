name: PETSHOP CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          # ใช้ค่าจาก Secrets (คุณตูนต้องไปแก้ใน Settings > Secrets ให้ถูกก่อนนะครับ)
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true

          tags: pimsuksuttirak/devop830-pipline:latest 

  deploy:
    needs: build-and-push-docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |

            docker pull pimsuksuttirak/devop830-pipline:latest
            docker stop petshop-container || true
            docker rm petshop-container || true
            docker run -d --name petshop-container -p 80:80 pimsuksuttirak/devop830-pipline:latest
