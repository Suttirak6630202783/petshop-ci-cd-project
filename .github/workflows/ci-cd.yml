name: PETSHOP CI/CD

# กำหนดให้ Workflow ทำงานเมื่อมีการ Push โค้ดไปยัง Branch 'main'
on:
  push:
    branches:
      - main

jobs:
  build-and-push-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true

          tags: suttirakpimsuk/petshop-app:latest 

  deploy:
    needs: build-and-push-docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # สคริปต์ที่จะรันบนเซิร์ฟเวอร์ AWS
          script: |
            docker pull suttirakpimsuk/petshop-app:latest
            docker stop petshop-container || true
            docker rm petshop-container || true
            docker run -d --name petshop-container -p 80:80 your-username/petshop-app:latest
